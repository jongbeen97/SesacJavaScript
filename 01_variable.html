<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    // var선언
    {
      var a;  // 초기 할당 없으면 Undefined가짐 
      console.log(a, typeof a);

      var a; // 선언을 또 한 것
      a = 10; // number타입 값을 할당한다. 
      console.log(a,typeof a);
      
      a = "hello wolrd" // string값을 할당
      console.log(a,typeof a);
    }

    console.log(a)

    /* let const*/
    {
      let b; // 초기 할당이 없으면 Undefined
      const c = true; // 초기 할당이 반드시 필요하다 . 초기 할당 안하면 컴파일오류 (상수)
      
      b = 10;
      console.log(b);
      b = "helloworld";
      console.log(b); // 동적할당의 특징은 그대로 유지한다

      // let b; 재선언은 불가하다.
    
    }
    // console.log(b); 스코프 벗어나면 접근 불가 

    // template Literal
    {
      const age = 10 ;
      const a = "나는" + age +"살입니다"; // 연결하기 
      const b = `나는 ${age}살입니다`; // expression interpolation
      console.log(a,b);
    }

    // hoisting 
    {
      money = 1000;
      console.log(money);
      var money; // 호이스팅 하자는 것이다 자바스크립트 인터프리터가 var선언부를 가장 먼저 읽는다. 

      console.log(car);
      var car = `sonata`;
      console.log(car);
    }


  </script>
</body>
</html>
