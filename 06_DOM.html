<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- DOM 취득 -->
    <h1 id="title" class="title head-tag">안녕하세요</h1>
    <h3 id="sub-title" class="title head-tag">Hello</h3>
    <script>
        const title = document.getElementById("title");
        console.log(title);
        /*DOM 취득 : getElementById()*/
        const subTitle = document.getElementById("sub-title");
        console.log(subTitle);

        const titleList = document.getElementsByClassName("title");
        console.log(titleList);
        
        for (const element of titleList){
            console.log(element);
        }

        // id 선택자 : # 다음에 id
        // class 선택자 : , 다음에 class 
        const headTags = document.querySelectorAll('.head-tag');
        console.log(headTags);
        headTags.forEach(tag => console.log(tag));
    </script> 

    <!-- DOM Attribute -->
    <div>
        <input type="text" id="id" class="inp" value="홍길동" readonly>
    </div>
    <script>
        const id = document.getElementById('id');
    
        console.log('type:', id.getAttribute('type'));  // "text"
        console.log('name:', id.getAttribute('name'));  // null (name 속성이 없음)
        console.log('id:', id.getAttribute('id'));  // "id"
        console.log('class:', id.getAttribute('class'));  // "inp"
        console.log('readonly:', id.getAttribute('readonly'));  // "" (readonly 속성의 값이 없음)
        
        //Attribute 수정(기존 value수정)
        id.setAttribute('value','나화진');
        // 새로운 Attribute 추가 [없는 속성(name)을 수정] 
        id.setAttribute('name','username');

        // Attribute 확인 
        if (id.hasAttribute('readonly')){
            console.log('읽기 전용 속성');
        }

        // Attribute 삭제 
        id.removeAttribute('readonly');

    </script>

    <!-- DOM Property -->
    <div>
        <input type="text" id="name" class="inp" value="홍길동" readonly>
    </div>
    
    <script>
        const name = document.getElementById('name');
        
        console.log(name.type);  // "text"
        console.log(name.id);  // "id"
        console.log(name.className);  // "inp"
        console.log(name.value);  // "홍길동"
        console.log(name.readOnly);  // true
    </script>

    <!-- Data Attribute -->
    <div>
        <div id="user" data-user-id="123" data-role="admin">사용자</div>
    </div>
    <script>
        const user = document.getElementById('user'); 

        // 접근
        console.log(user.dataset.userId); // "123" (하이픈이 카멜케이스로 변환됨)
        console.log(user.dataset.role);   // "admin"

        // 수정
        user.dataset.role = 'guest';
    </script>

    <!-- CSS 스타일 -->
     <div>
        <a id="google-link" href="https://www.google.com/">Google</a>
    </div>
    <script>
        const googleLink = document.getElementById('google-link');
        googleLink.style.color = '#080808';
        googleLink.style.fontSize = '24px';
        googleLink.style['font-weight'] = '700';
        googleLink.style['text-decoration'] = 'none';
    </script>
</body>
</html>
