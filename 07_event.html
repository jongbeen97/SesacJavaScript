<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 인라인 이벤트 -->
    <button onclick="alert('잘가라 홍명보')">홍명보</button>
    <button onclick="showMessage()">계란투척</button>
    <script>
        function showMessage() {
            alert('당신은 경질입니다');
        }
    </script>

    <hr>

    <!-- 고전 이벤트 -->
     <button id="myBtn" data-user-role="korean">쌰갈명보</button>
     <script>
        const btn = document.querySelector('#myBtn');

        // 첫 번째 핸들러 등록
        btn.onclick = function() {
        console.log('첫 번째 작업');
        };

        // 두 번째 핸들러 등록 (첫 번째 핸들러가 제거됨)
        btn.onclick = function() {
        console.log('두 번째 작업만 실행됩니다.');
        };

        function fnEvent1(){
            console.log("첫번째 작업")
        }
        function fnEvent2(){
            console.log("두번째 작업")
        }
        btn.onclick = function(e){
            fnEvent1();
            fnEvent2();
        }
        
        // 이벤트 객체 사용 onclick -> 이벤트 핸들러에 첫 매개변수로 선언하고 사용
        btn.onclick = (e) => {
            console.log('type:', e.type);
            console.log('target:', e.target);
            console.log('currentTarget:', e.currentTarget);
            console.log('this:',this);
            console.log('data-user-role:', e.target.dataset.userRole);
        }

     </script>

     <!-- 인라인 방식의 객체 : 반드시 이벤트라는 이름으로 넘겨줘야 함-->
      <button onclick="fnInline(event)">홍명보 나가 ...</button>
       <script>
        function fnInline(e){
            console.log('target:', e.target);
            console.log('currentTarget:', e.currentTarget);
            console.log('this:',this);
        }
       </script>

     <hr>
     <!-- 표준 이벤트 -->
     <button id="ourBtn">제발 꺼져줘</button>
     <script>
        const ourBtn = document.querySelector('#ourBtn');

        const logHello = () => console.log('Hello');
        const logWorld = () => console.log('World');

        // 여러 개의 리스너 등록 가능 (둘 다 실행됨)
        ourBtn.addEventListener('click', logHello);
        ourBtn.addEventListener('click', logWorld);

        // 특정 리스너만 제거 가능
        ourBtn.removeEventListener('click', logHello);
        ourBtn.removeEventListener('click', logWorld);

        // 이벤트 객체 
        ourBtn.addEventListener('click', function(e){
            console.log('target:', e.target);
            console.log('currentTarget:', e.currentTarget);
            console.log('this:',this);
        })
     </script>

     <hr>

     <!-- (tr>td*3)*3 면 3줄 3칸짜리가 됨-->
     <!-- 이벤트 버블링과 이벤트 위임-->
      <style>
        #my-table{
            padding : 20px;
            border-collapse: collapse;
        }
        #my-table td{
            padding : 20px;
            border : 1px solid black;
        }
      </style>
     <table id="my-table">
        <tbody>
            <tr>
                <td>과일이름</td>
                <td>과일가격</td>
                <td>과일 단위 갯수</td>
            </tr>
            <tr>
                <td>사과</td>
                <td>25,000원</td>
                <td>20개/Box</td>
            </tr>
            <tr>
                <td>배</td>
                <td>33,000원</td>
                <td>20개/box</td>
            </tr>
            
        </tbody>    
    </table>

    <script>
        // 부모 요소인 my-table 취득 
        const myTable = document.getElementById('my-table');

        // 부모 요소에 클릭 이벤트 하나만 등록 (자식 요소의 클릭 이벤트를 위임 받는 이벤트)
        myTable.addEventListener('click', function(e){
            
            // 이벤트 위임 핵심 : 실제로 클릭한 가장 안쪽 요소(사용자가 클릭한 요소)
            const clickedElement = e.target;

            // td 클릭 확인하기 
            if (clickedElement.tagName !== 'TD'){
                return;
            }

            // td 태그 내부 텍스트 (textContent) 가져오기
            alert(`선택한 과일 : ${clickedElement.textContent}`);
        });
    </script>

<!-- 이벤트 위임 -->
    <ul id="menuContainer" style="list-style: none; padding: 0;">
  <li>
    <button class="menu-item" data-menu="home">
      <i class="icon">🏠</i>
      <span>홈으로 가기</span>
    </button>
  </li>
  <li>
    <button class="menu-item" data-menu="profile">
      <i class="icon">👤</i>
      <span>프로필 설정</span>
    </button>
  </li>
  <li>
    <button class="menu-item" data-menu="settings">
      <i class="icon">⚙️</i>
      <span>시스템 환경</span>
    </button>
  </li>
</ul>
<script>
  const menuContainer = document.getElementById('menuContainer');

  // [핵심1] 부모 요소에 이벤트 리스너 등록
  menuContainer.addEventListener('click', (e) => {
    
    // [핵심2] e.target에서부터 가장 가까운 .menu-item 조상을 찾습니다.
    // (e.target: 클릭한 가장 안쪽 요소)
    // 클릭된 게 <i>이든, <span>이든 최종적으로 <button>을 찾아냅니다.
    const btn = e.target.closest('.menu-item');

    // Early Return
    if (!btn) return;
    if (!menuContainer.contains(btn)) return;

    // Business Login
    const menuName = btn.dataset.menu;
    console.log(`선택된 메뉴: ${menuName}`);
  });
</script>

<!-- 이벤트 전파 방지 -->

<div id="overlay" style="border: 1px solid gray; padding: 50px;">
  <div id="content" style="background-color: silver;">
    <h2>모달 창 제목</h2>
    <p>모달 내부를 클릭해도 모달은 닫히지 않습니다.</p>
  </div>
</div>

<script>
  const overlay = document.getElementById('overlay');
  const content = document.getElementById('content');
  
  // 배경을 클릭하면 모달을 닫음
  overlay.addEventListener('click', () => {
    console.log('배경이 클릭되어 모달을 닫습니다.');
    overlay.style.display = 'none';
  });

  // 모달 내부 콘텐츠를 클릭했을 때
  content.addEventListener('click', (e) => {
    e.stopPropagation();  // 이벤트 버블링 중단
    console.log('부모(overlay)의 클릭 이벤트가 실행되지 않게 합니다.');
  });
</script>

<hr>

<!-- 기본 이벤트 취소 -->
 <!-- action="http://localhost:8080/users" 제출을 누르면 여기 링크로 저장이 왼다는 것이다  -->
 <form id="user-form"> 
    <input type="text" id="username" name="username">
    <button type="submit">제출</button>
 </form>
 <script>
    const userForm = document.getElementById('user-form');
    // 제출 버튼을 클릭 하는 것이고 form 은 제출을 하는 것. 
    // user-form의 이벤트는 
    userForm.addEventListener('submit', function(e) {
        console.log('제출 완료');
        e.preventDefault(); // 기본 이벤트 취소 
    })
</script>

</body>
</html>
